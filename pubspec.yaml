name: offline_music_player
description: A complete offline music player application.
publish_to: "none"
version: 1.1.0+2

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # State Management
  provider: ^6.1.1
  
  # Audio
  just_audio: ^0.9.36
  audio_service: ^0.18.12
  on_audio_query: ^2.9.0
  
  # Utilities
  permission_handler: ^12.0.1
  device_info_plus: ^11.3.0
  path_provider: ^2.1.2
  rxdart: ^0.28.0
  shared_preferences: ^2.2.2
  http: ^1.2.0
  url_launcher: ^6.2.5
  package_info_plus: ^8.0.0
  
  # UI
  google_fonts: ^6.1.0
  font_awesome_flutter: 10.6.0
  device_preview: ^1.1.0
  
  # Streaming & Caching
  youtube_explode_dart: ^3.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  cached_network_image: ^3.3.1
  connectivity_plus: ^6.0.3
  path: ^1.8.3
  firebase_core: ^4.4.0
  firebase_database: ^12.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  mockito: ^5.4.4
  build_runner: ^2.4.0

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#0D4F4F"
  adaptive_icon_foreground: "assets/icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
